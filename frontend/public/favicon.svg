<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" preserveAspectRatio="xMidYMid meet">
  <rect width="200" height="320" fill="#000"/>
  <defs>
    <mask id="cut" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="200" height="320" fill="white"/>
      <ellipse cx="100" cy="160" rx="78" ry="128" fill="black" transform="rotate(-5 100 160)"/>
